# Confinia — SERVICES PARTAGÉS (VM) : edge applicatif, observabilité
# applicative, état opérationnel, aperçu démo. Les stacks bleu/vert (API +
# base géo par couleur) vivent dans deploy/stack/docker-compose-<couleur>.yml
# et se pilotent par deploy/stacks.sh + deploy/deploy-api.sh.
services:
  # Caddy APPLICATIF confinia : HTTP simple sur 127.0.0.1:8085, derrière le
  # caddy AMONT de la plateforme (~/projects/platform), qui possède 80/443 et
  # les certificats. Réseau hôte : il voit les X-Forwarded-* de l'amont et
  # joint les backends via leurs ports localhost (api 8000/8001/8002,
  # grafana applicatif 3000). Config montée en RÉPERTOIRE : `caddy reload`
  # gracieux via deploy/deploy-edge.sh = mise à jour SANS coupure.
  caddy:
    image: docker.io/library/caddy:2
    network_mode: host
    env_file:
      - ./deploy/secrets.env   # STAGING_USER / STAGING_HASH (basic auth staging)
    volumes:
      - ./deploy/caddy:/etc/caddy:ro
      # État de bascule couleur (généré par deploy/stacks.sh promote) :
      # volontairement HORS du miroir rsync pour survivre aux syncs.
      - /home/debian/confinia-edge-state:/etc/caddy/active:ro
      # Vhosts par projet (import /etc/caddy/sites/*.caddy) — montage
      # imbriqué : chaque projet de la VM dépose ici son fichier .caddy.
      - ./deploy/sites:/etc/caddy/sites:ro
      # Page publique confinia.io (pitch, quickstart, attributions)
      - ./deploy/site:/srv/site:ro
      # Démo (miroir rsync) : servie sur staging.confinia.io pour validation
      - ./demo:/srv/demo:ro
      - caddy_data:/data
      - caddy_config:/config
    # pas de depends_on : caddy (réseau hôte) joint l'api via 127.0.0.1:8000 et
    # la dépendance podman bloquait toute recréation isolée du conteneur api.
    restart: unless-stopped

  # État OPÉRATIONNEL partagé (api_key, api_usage, visitor_daily) : les bases
  # géo des stacks bleu/vert sont des artefacts jetables reconstruits par
  # double ingestion ; l'état précieux vit ici, petit et sauvegardable.
  ops-db:
    image: docker.io/library/postgres:16
    env_file:
      - ./deploy/secrets.env
    ports:
      # Toutes interfaces : les conteneurs API la joignent via
      # host.containers.internal ; ufw bloque 5440 depuis l'extérieur.
      - "5440:5432"
    volumes:
      - opsdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U confinia -d confinia"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # IdP Keycloak (issue #19) : identités, inscription avec organisation
  # obligatoire. Servi SOUS www.confinia.io/auth (chemin relatif, pas de
  # nouveau DNS) derrière le caddy applicatif ; base dédiée `keycloak`
  # dans l'instance ops-db (état précieux, même politique de sauvegarde).
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command:
      - start
      - --http-enabled=true
      - --http-port=8180
      - --http-relative-path=/auth
      - --hostname=https://www.confinia.io/auth
      - --hostname-backchannel-dynamic=true
      - --proxy-headers=xforwarded
    env_file:
      - ./deploy/secrets.env   # KC_BOOTSTRAP_ADMIN_*, KC_DB_USERNAME/PASSWORD
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://host.containers.internal:5440/keycloak
      KC_HTTP_MANAGEMENT_PORT: "9001"   # health/metrics hors du chemin public
    ports:
      - "127.0.0.1:8180:8180"
    restart: unless-stopped

  # --- Observabilité (Step 5b) : OTel collector -> Prometheus -> Grafana ---
  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      # Toutes interfaces : les API des stacks couleur poussent leurs
      # métriques via host.containers.internal ; ufw bloque 4318 dehors.
      - "4318:4318"
    volumes:
      - ./deploy/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    restart: unless-stopped

  prometheus:
    image: docker.io/prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=180d"   # tendances d'usage longues
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    restart: unless-stopped

  grafana:
    image: docker.io/grafana/grafana-oss:latest
    env_file:
      - ./deploy/secrets.env          # GF_SECURITY_ADMIN_PASSWORD — jamais commité
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Grafana APPLICATIF servi derrière www.confinia.io/grafana (le
      # hostname grafana.confinia.io est désormais le grafana PLATEFORME).
      GF_SERVER_ROOT_URL: https://www.confinia.io/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"   # joint par caddy (réseau hôte)
    restart: unless-stopped

  # Aperçu local/VM de la démo (make demo). La prod de la démo ira sur
  # GitHub Pages (décision fixe) — ceci n'est qu'une prévisualisation.
  demo:
    image: docker.io/library/caddy:2
    command: caddy file-server --root /srv --listen :80
    ports:
      - "0.0.0.0:8080:80"
    volumes:
      - ./demo:/srv:ro
    profiles: ["tools"]

volumes:
  # pgdata : volume de l'ANCIENNE base géo unique, conservé par prudence
  # après le passage aux stacks couleur (2026-07-20) ; suppression quand sûr.
  pgdata:
  opsdata:
  caddy_data:
  caddy_config:
  prom_data:
  grafana_data:
