# Confinia — stack locale et VM (même fichier, mêmes commandes).
#   macOS  : docker compose ... (socktainer + Apple container)
#   Debian : docker compose ... (podman + podman-docker) ou podman-compose
services:
  db:
    image: docker.io/postgis/postgis:16-3.4
    # Identifiants dans deploy/secrets.env (gitignoré) — podman-compose
    # n'interpole pas ${VAR:-default}, env_file est la voie sûre.
    env_file:
      - ./deploy/secrets.env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U confinia -d confinia"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Outil d'ingestion : lancé à la demande, jamais en service permanent.
  #   docker compose run --rm ingest /app/ingest_cog.py --millesimes 2025 --data-dir /data/raw/insee
  #   docker compose run --rm ingest /app/join_geometry.py --data-dir /data/raw/insee ...
  ingest:
    build: ./ingestion
    image: confinia-ingest:latest
    profiles: ["tools"]
    env_file:
      - ./deploy/secrets.env
    volumes:
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy

  # API en bleu/vert : `api` (bleu, 8000) + `api-b` (vert, 8001), même image.
  # Caddy équilibre les deux avec health checks ; deploy/deploy-api.sh fait le
  # déploiement roulant (rebuild -> vert -> bleu) sans coupure de service.
  api:
    build: ./api
    image: confinia-api:latest
    env_file:
      - ./deploy/secrets.env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    volumes:
      - ./data/geoip:/geoip:ro   # dbip-country-lite.mmdb (pays d'appel, jamais l'IP)
    ports:
      - "127.0.0.1:8000:8000"   # accès local/ssh ; le public passe par caddy
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  api-b:
    image: confinia-api:latest    # pas de build : l'image est construite par `api`
    env_file:
      - ./deploy/secrets.env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    volumes:
      - ./data/geoip:/geoip:ro
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Caddy APPLICATIF confinia : HTTP simple sur 127.0.0.1:8085, derrière le
  # caddy AMONT de la plateforme (~/projects/platform), qui possède 80/443 et
  # les certificats. Réseau hôte : il voit les X-Forwarded-* de l'amont et
  # joint les backends via leurs ports localhost (api 8000/8001/8002,
  # grafana applicatif 3000). Config montée en RÉPERTOIRE : `caddy reload`
  # gracieux via deploy/deploy-edge.sh = mise à jour SANS coupure.
  caddy:
    image: docker.io/library/caddy:2
    network_mode: host
    env_file:
      - ./deploy/secrets.env   # STAGING_USER / STAGING_HASH (basic auth staging)
    volumes:
      - ./deploy/caddy:/etc/caddy:ro
      # Vhosts par projet (import /etc/caddy/sites/*.caddy) — montage
      # imbriqué : chaque projet de la VM dépose ici son fichier .caddy.
      - ./deploy/sites:/etc/caddy/sites:ro
      # Page publique confinia.io (pitch, quickstart, attributions)
      - ./deploy/site:/srv/site:ro
      # Démo (miroir rsync) : servie sur staging.confinia.io pour validation
      - ./demo:/srv/demo:ro
      - caddy_data:/data
      - caddy_config:/config
    # pas de depends_on : caddy (réseau hôte) joint l'api via 127.0.0.1:8000 et
    # la dépendance podman bloquait toute recréation isolée du conteneur api.
    restart: unless-stopped

  # --- Observabilité (Step 5b) : OTel collector -> Prometheus -> Grafana ---
  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./deploy/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    restart: unless-stopped

  prometheus:
    image: docker.io/prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=180d"   # tendances d'usage longues
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    restart: unless-stopped

  grafana:
    image: docker.io/grafana/grafana-oss:latest
    env_file:
      - ./deploy/secrets.env          # GF_SECURITY_ADMIN_PASSWORD — jamais commité
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Grafana APPLICATIF servi derrière www.confinia.io/grafana (le
      # hostname grafana.confinia.io est désormais le grafana PLATEFORME).
      GF_SERVER_ROOT_URL: https://www.confinia.io/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"   # joint par caddy (réseau hôte)
    restart: unless-stopped

  # Aperçu local/VM de la démo (make demo). La prod de la démo ira sur
  # GitHub Pages (décision fixe) — ceci n'est qu'une prévisualisation.
  demo:
    image: docker.io/library/caddy:2
    command: caddy file-server --root /srv --listen :80
    ports:
      - "0.0.0.0:8080:80"
    volumes:
      - ./demo:/srv:ro
    profiles: ["tools"]

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  prom_data:
  grafana_data:
