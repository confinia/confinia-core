# Confinia — SHARED SERVICES (VM): application edge, application
# observability, operational state, demo preview. The blue/green stacks
# (API + geo db per color) live in deploy/stack/docker-compose-<color>.yml
# and are driven by deploy/stacks.sh + deploy/deploy-api.sh.
services:
  # Confinia APPLICATION caddy: plain HTTP on 127.0.0.1:8085, behind the
  # platform's UPSTREAM caddy (~/projects/platform), which owns 80/443 and
  # the certificates. Host network: it sees the upstream's X-Forwarded-*
  # and reaches the backends via their localhost ports (api 8000/8001/8002,
  # application grafana 3000). Config mounted as a DIRECTORY: graceful
  # `caddy reload` via deploy/deploy-edge.sh = update with ZERO downtime.
  caddy:
    image: docker.io/library/caddy:2
    network_mode: host
    env_file:
      - ./deploy/secrets.env   # STAGING_USER / STAGING_HASH (basic auth staging)
    volumes:
      - ./deploy/caddy:/etc/caddy:ro
      # Color switchover state (generated by deploy/stacks.sh promote):
      # deliberately OUTSIDE the rsync mirror so it survives syncs.
      - /home/debian/confinia-edge-state:/etc/caddy/active:ro
      # Per-project vhosts (import /etc/caddy/sites/*.caddy) — nested
      # mount: each project on the VM drops its .caddy file here.
      - ./deploy/sites:/etc/caddy/sites:ro
      # Public confinia.io page (pitch, quickstart, attributions)
      - ./deploy/site:/srv/site:ro
      # Demo (rsync mirror): served on staging.confinia.io for validation
      - ./demo:/srv/demo:ro
      - caddy_data:/data
      - caddy_config:/config
    # no depends_on: caddy (host network) reaches the api via 127.0.0.1:8000 and
    # the podman dependency blocked any isolated recreation of the api container.
    restart: unless-stopped

  # Shared OPERATIONAL state (api_key, api_usage, visitor_daily): the geo
  # databases of the blue/green stacks are disposable artifacts rebuilt by
  # double ingestion; the precious state lives here, small and backupable.
  ops-db:
    image: docker.io/library/postgres:16
    env_file:
      - ./deploy/secrets.env
    ports:
      # All interfaces: the API containers reach it via
      # host.containers.internal; ufw blocks 5440 from the outside.
      - "5440:5432"
    volumes:
      - opsdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U confinia -d confinia"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # Keycloak IdP (issue #19): identities, registration with mandatory
  # organization. Served UNDER www.confinia.io/auth (relative path, no
  # new DNS) behind the application caddy; dedicated `keycloak` database
  # in the ops-db instance (precious state, same backup policy).
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command:
      - start
      - --http-enabled=true
      - --http-port=8180
      - --http-relative-path=/auth
      - --hostname=https://www.confinia.io/auth
      - --hostname-backchannel-dynamic=true
      - --proxy-headers=xforwarded
    env_file:
      - ./deploy/secrets.env   # KC_BOOTSTRAP_ADMIN_*, KC_DB_USERNAME/PASSWORD
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://host.containers.internal:5440/keycloak
      KC_HTTP_MANAGEMENT_PORT: "9001"   # health/metrics off the public path
    ports:
      - "127.0.0.1:8180:8180"
    restart: unless-stopped

  # --- Observability (Step 5b): OTel collector -> Prometheus -> Grafana ---
  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      # All interfaces: the color stacks' APIs push their metrics via
      # host.containers.internal; ufw blocks 4318 from the outside.
      - "4318:4318"
    volumes:
      - ./deploy/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    restart: unless-stopped

  prometheus:
    image: docker.io/prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=180d"   # long usage trends
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    restart: unless-stopped

  grafana:
    image: docker.io/grafana/grafana-oss:latest
    env_file:
      - ./deploy/secrets.env          # GF_SECURITY_ADMIN_PASSWORD — never committed
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
      # APPLICATION Grafana served behind www.confinia.io/grafana (the
      # grafana.confinia.io hostname is now the PLATFORM grafana).
      GF_SERVER_ROOT_URL: https://www.confinia.io/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"   # reached by caddy (host network)
    restart: unless-stopped

  # Local/VM preview of the demo (make demo). The demo's production will
  # go to GitHub Pages (fixed decision) — this is only a preview.
  demo:
    image: docker.io/library/caddy:2
    command: caddy file-server --root /srv --listen :80
    ports:
      - "0.0.0.0:8080:80"
    volumes:
      - ./demo:/srv:ro
    profiles: ["tools"]

volumes:
  # pgdata: volume of the FORMER single geo database, kept out of caution
  # after the move to color stacks (2026-07-20); delete when safe.
  pgdata:
  opsdata:
  caddy_data:
  caddy_config:
  prom_data:
  grafana_data:
