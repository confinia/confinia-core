# Confinia — stack locale et VM (même fichier, mêmes commandes).
#   macOS  : docker compose ... (socktainer + Apple container)
#   Debian : docker compose ... (podman + podman-docker) ou podman-compose
services:
  db:
    image: docker.io/postgis/postgis:16-3.4
    # Identifiants dans deploy/secrets.env (gitignoré) — podman-compose
    # n'interpole pas ${VAR:-default}, env_file est la voie sûre.
    env_file:
      - ./deploy/secrets.env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U confinia -d confinia"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Outil d'ingestion : lancé à la demande, jamais en service permanent.
  #   docker compose run --rm ingest /app/ingest_cog.py --millesimes 2025 --data-dir /data/raw/insee
  #   docker compose run --rm ingest /app/join_geometry.py --data-dir /data/raw/insee ...
  ingest:
    build: ./ingestion
    image: confinia-ingest:latest
    profiles: ["tools"]
    env_file:
      - ./deploy/secrets.env
    volumes:
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./api
    image: confinia-api:latest
    env_file:
      - ./deploy/secrets.env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    volumes:
      - ./data/geoip:/geoip:ro   # dbip-country-lite.mmdb (pays d'appel, jamais l'IP)
    ports:
      - "127.0.0.1:8000:8000"   # accès local/ssh ; le public passe par caddy
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Reverse proxy + HTTPS automatique (Let's Encrypt). DNS: *.confinia.io -> VM.
  # network_mode host : rootlessport réécrit l'IP source (GeoIP aveugle) ; en
  # réseau hôte, caddy voit la vraie IP client et joint les backends via leurs
  # ports publiés en localhost (api 8000, grafana 3000).
  caddy:
    image: docker.io/library/caddy:2
    network_mode: host
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Vhosts par projet (import sites/*.caddy dans le Caddyfile) —
      # chaque projet de la VM dépose ici son fichier .caddy.
      - ./deploy/sites:/etc/caddy/sites:ro
      # Page publique confinia.io (pitch, quickstart, attributions)
      - ./deploy/site:/srv/site:ro
      - caddy_data:/data
      - caddy_config:/config
    # pas de depends_on : caddy (réseau hôte) joint l'api via 127.0.0.1:8000 et
    # la dépendance podman bloquait toute recréation isolée du conteneur api.
    restart: unless-stopped

  # --- Observabilité (Step 5b) : OTel collector -> Prometheus -> Grafana ---
  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./deploy/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    restart: unless-stopped

  # Métriques système de la VM (CPU, RAM, disque, réseau, IO) pour Grafana.
  # Réseau hôte (comme caddy) : node_exporter voit les vraies interfaces et le
  # host joint 9100 ; ufw ne laisse pas entrer 9100 depuis l'extérieur.
  node-exporter:
    image: docker.io/prom/node-exporter:latest
    network_mode: host
    pid: host
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--web.listen-address=:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    restart: unless-stopped

  prometheus:
    image: docker.io/prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=180d"   # tendances d'usage longues
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    restart: unless-stopped

  grafana:
    image: docker.io/grafana/grafana-oss:latest
    env_file:
      - ./deploy/secrets.env          # GF_SECURITY_ADMIN_PASSWORD — jamais commité
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://grafana.confinia.io
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"   # joint par caddy (réseau hôte)
    restart: unless-stopped

  # Aperçu local/VM de la démo (make demo). La prod de la démo ira sur
  # GitHub Pages (décision fixe) — ceci n'est qu'une prévisualisation.
  demo:
    image: docker.io/library/caddy:2
    command: caddy file-server --root /srv --listen :80
    ports:
      - "0.0.0.0:8080:80"
    volumes:
      - ./demo:/srv:ro
    profiles: ["tools"]

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  prom_data:
  grafana_data:
