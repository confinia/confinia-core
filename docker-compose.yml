# Confinia — stack locale et VM (même fichier, mêmes commandes).
#   macOS  : docker compose ... (socktainer + Apple container)
#   Debian : docker compose ... (podman + podman-docker) ou podman-compose
services:
  db:
    image: docker.io/postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: confinia
      POSTGRES_USER: confinia
      # Mot de passe de dev : la base n'écoute qu'en localhost/réseau compose.
      # À durcir avant la beta (TODO Step 6) — podman-compose n'interpole pas
      # ${VAR:-default}, donc pas de valeur par défaut dynamique ici.
      POSTGRES_PASSWORD: <dev-password-rotated>
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U confinia -d confinia"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Outil d'ingestion : lancé à la demande, jamais en service permanent.
  #   docker compose run --rm ingest /app/ingest_cog.py --millesimes 2025 --data-dir /data/raw/insee
  #   docker compose run --rm ingest /app/join_geometry.py --data-dir /data/raw/insee ...
  ingest:
    build: ./ingestion
    image: confinia-ingest:latest
    profiles: ["tools"]
    environment:
      PG_DSN: postgresql://confinia:<dev-password-rotated>@db:5432/confinia
    volumes:
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./api
    image: confinia-api:latest
    environment:
      PG_DSN: postgresql://confinia:<dev-password-rotated>@db:5432/confinia
    ports:
      - "127.0.0.1:8000:8000"   # accès local/ssh ; le public passe par caddy
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Reverse proxy + HTTPS automatique (Let's Encrypt). DNS: *.confinia.io -> VM.
  caddy:
    image: docker.io/library/caddy:2
    ports:
      # 0.0.0.0 explicite : sans lui, rootlessport n'ouvre qu'une socket IPv6
      # et les SYN IPv4 externes sont rejetés (RST) — vu le 2026-07-18.
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
