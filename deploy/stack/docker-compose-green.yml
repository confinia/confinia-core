# Confinia GREEN stack: API + GEO database of the green color.
# The geo database is a BUILD ARTIFACT: rebuilt by double ingestion
# (deploy/build-geo.sh green), NEVER copied from the other color.
# The operational state lives in the shared ops-db (root compose).
# Commands:
#   podman-compose -p confinia-green -f deploy/stack/docker-compose-green.yml up -d db
#   podman-compose -p confinia-green -f deploy/stack/docker-compose-green.yml --profile serve up -d api
services:
  db:
    image: docker.io/postgis/postgis:16-3.4
    env_file:
      - ../secrets.env
    ports:
      - "127.0.0.1:5442:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U confinia -d confinia"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    image: confinia-api:latest
    profiles: ["serve"]
    env_file:
      - ../secrets.env            # PG_DSN (host `db` = THIS color's db), OPS_DSN
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://host.containers.internal:4318
    volumes:
      - ../../data/geoip:/geoip:ro
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  ingest:
    image: confinia-ingest:latest
    profiles: ["tools"]
    env_file:
      - ../secrets.env
    volumes:
      - ../../data:/data

volumes:
  pgdata:
